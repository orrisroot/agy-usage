name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version Match
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Tag matches Cargo.toml and follows format
        shell: bash
        run: |
          # Extract tag version from ref (e.g., refs/tags/v0.1.0 -> v0.1.0)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Enforce that tag name must start with 'v' and follow major.minor.micro format only
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: Tag must start with 'v' and follow major.minor.micro format (e.g., v0.1.0). Found: $TAG_NAME"
            exit 1
          fi
          
          # Strip leading 'v' to get version number
          TAG_VERSION=${TAG_NAME#v}
          
          # Extract version from Cargo.toml
          CARGO_VERSION=$(grep -m 1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          
          echo "Tag Name: $TAG_NAME"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag version: $TAG_VERSION"
          
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml version ($CARGO_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Versions match successfully."

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package artifact
        shell: bash
        run: |
          BINARY_NAME="agy-usage"
          RELEASE_DIR="target/${{ matrix.target }}/release"
          ARCHIVE_NAME="agy-usage-${{ github.ref_name }}-${{ matrix.target }}"
          
          # Copy metadata files
          cp README.md LICENSE "$RELEASE_DIR/"
          
          cd "$RELEASE_DIR"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: Create zip file using 7z
            7z a "../../../${ARCHIVE_NAME}.zip" "${BINARY_NAME}.exe" README.md LICENSE
          else
            # Unix: Create tar.gz file
            tar -czf "../../../${ARCHIVE_NAME}.tar.gz" "${BINARY_NAME}" README.md LICENSE
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: agy-usage-${{ github.ref_name }}-${{ matrix.target }}.*
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List downloaded files
        run: |
          ls -la artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
